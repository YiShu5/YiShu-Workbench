<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的工作台 · 蓝胖子督促版</title>
<style>
/* ===================================================================
   样式分区 · grep 横幅文字（---------- 名称 ----------）跳转：
     变量(:root) · 布局壳 · 侧栏 · 顶栏(移动端) · 通用组件 ·
     开门拦截屏 #gate + 铃铛印章 .stamp · 督促台(.stat/.pocket 百宝袋) ·
     任务(.titem) · 写作室+发布矩阵(.edt/.mrow) · 柯维四象限(.qm) · 响应式
   =================================================================== */
:root{
  --bg:#E3F4FC;            /* 天空蓝底 */
  --surface:#FFFFFF;        /* 白肚皮 */
  --surface2:#F2FAFE;
  --ink:#16384E; --ink2:#4E7187; --ink3:#8FAAB9;
  --line:#CBE4F0; --line2:#E0F0F8;
  --blue:#1296DB; --blue-d:#0A78B5; --blue-soft:#D6EEFA;   /* 身体蓝 */
  --red:#E0312F; --red-soft:#FCE3E0;                        /* 项圈红 */
  --bell:#FFC93C; --bell-d:#E8A800; --bell-soft:#FFF3CF;    /* 铃铛黄 */
  --green:#2BA86E; --green-soft:#DDF3E7;
  --radius:16px;
  --serif:"Noto Serif SC","Songti SC","STSong",serif;
  --sans:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:var(--ink)}
::selection{background:var(--blue-soft)}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}

/* ---------- 布局壳 ---------- */
#app{display:flex;height:100%;overflow:hidden}
aside{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:transform .25s ease;z-index:40}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{max-width:860px;margin:0 auto;padding:28px 24px 90px}

/* 侧栏 */
.brand{padding:18px 18px 14px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
.brand .mark{width:38px;height:38px;border-radius:50%;background:var(--blue);position:relative;box-shadow:inset 0 -12px 0 #fff;border:2px solid var(--blue-d)}
.brand .mark::after{content:"";position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--bell);border:2px solid var(--bell-d)}
.brand h1{font-size:15px;font-weight:700}
.brand .sub{font-size:11px;color:var(--ink3);letter-spacing:.08em}
.bellbar{margin:12px 12px 0;background:var(--bell-soft);border:1.5px solid var(--bell);border-radius:99px;padding:6px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700}
.bellbar .n{font-family:var(--mono);font-size:16px;color:var(--bell-d)}
.bellbar small{font-weight:500;color:var(--ink2);font-size:11px}
nav{flex:1;overflow-y:auto;padding:8px 10px 16px}
.sec{font-size:11px;color:var(--ink3);letter-spacing:.18em;padding:14px 10px 6px}
.navitem{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:12px;color:var(--ink2);text-align:left;margin-bottom:2px}
.navitem:hover{background:var(--surface2)}
.navitem.on{background:var(--blue);color:#fff;font-weight:600;box-shadow:0 3px 0 var(--blue-d)}
.navitem .num{font-family:var(--serif);font-size:15px;font-weight:700;width:18px;text-align:center;color:var(--ink3)}
.navitem.on .num{color:#fff}
.navitem .nm{flex:1}
.badge{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--line2);color:var(--ink2);border-radius:99px;padding:0 7px;line-height:18px}
.navitem.on .badge{background:rgba(255,255,255,.25);border-color:transparent;color:#fff}
.badge.hot{background:var(--red);border-color:var(--red);color:#fff}
.foot{border-top:1px solid var(--line2);padding:12px 16px;font-size:11px;color:var(--ink3)}
.foot .row{display:flex;justify-content:space-between;margin-bottom:4px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bell-d);margin-right:6px;vertical-align:1px}

/* 顶栏（移动端） */
.topbar{display:none;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 14px;z-index:30;align-items:center;gap:12px}
.topbar .hamb{width:36px;height:36px;border-radius:12px;border:1px solid var(--line);background:var(--surface);font-size:16px}
.topbar .where{font-weight:700;flex:1}
.topbar .where .num{font-family:var(--serif);color:var(--blue);margin-right:6px}
.topbar .tb-bell{font-family:var(--mono);font-weight:700;color:var(--bell-d);background:var(--bell-soft);border:1.5px solid var(--bell);border-radius:99px;padding:2px 10px;font-size:13px}
.scrim{display:none;position:fixed;inset:0;background:rgba(10,50,75,.35);z-index:35}

/* ---------- 通用组件 ---------- */
.eyebrow{font-size:11px;letter-spacing:.2em;color:var(--ink3);margin-bottom:6px}
h2.title{font-family:var(--serif);font-size:24px;font-weight:700;display:flex;align-items:baseline;gap:12px}
h2.title .num{color:var(--blue);font-size:30px}
.desc{color:var(--ink2);margin-top:6px}
.card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
.card h3{font-size:13px;letter-spacing:.06em;color:var(--ink2);font-weight:700;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600}
.btn:hover{border-color:var(--ink3)}
.btn.pri{background:var(--blue);border-color:var(--blue-d);color:#fff;box-shadow:0 3px 0 var(--blue-d)}
.btn.pri:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-d)}
.btn.red{background:var(--red);border-color:#B22220;color:#fff;box-shadow:0 3px 0 #B22220}
.btn.red:active{transform:translateY(2px);box-shadow:0 1px 0 #B22220}
.btn.bell{background:var(--bell);border-color:var(--bell-d);color:#6B4D00;box-shadow:0 3px 0 var(--bell-d)}
.btn.bell:active{transform:translateY(2px);box-shadow:0 1px 0 var(--bell-d)}
.btn.bell:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.ghost{border-color:transparent;color:var(--ink2);box-shadow:none}
.btn.sm{padding:4px 12px;font-size:13px}
.tag{font-size:11px;padding:1px 9px;border-radius:99px;border:1px solid var(--line);color:var(--ink2);background:var(--surface2)}
.tag.red{background:var(--red-soft);border-color:transparent;color:var(--red);font-weight:700}
.tag.blue{background:var(--blue-soft);border-color:transparent;color:var(--blue-d)}
.tag.bell{background:var(--bell-soft);border-color:transparent;color:var(--bell-d);font-weight:700}
.tag.green{background:var(--green-soft);border-color:transparent;color:var(--green);font-weight:700}
.empty{padding:34px 16px;text-align:center;color:var(--ink3)}
.empty .big{font-family:var(--serif);font-size:18px;color:var(--ink2);margin-bottom:4px}

/* ---------- 0 开门拦截屏 ---------- */
#gate{position:fixed;inset:0;background:linear-gradient(180deg,#D7F0FB 0%,var(--bg) 30%);z-index:100;overflow-y:auto;display:none}
#gate.open{display:block}
.gate-wrap{max-width:680px;margin:0 auto;padding:7vh 22px 60px}
.gate-date{font-family:var(--mono);color:var(--ink2);letter-spacing:.1em;font-size:13px}
.gate-h{font-family:var(--serif);font-size:38px;font-weight:700;margin:6px 0 2px}
.gate-h em{font-style:normal;color:var(--red)}
.gate-sub{color:var(--ink2)}
.doorhead{display:flex;align-items:center;gap:18px;margin:6px 0 12px}
.doorico{width:56px;height:82px;min-width:56px;background:#F2719A;border:3px solid #D14E7B;border-radius:28px 28px 6px 6px;position:relative;box-shadow:inset 0 0 0 6px #FBD9E4,0 4px 0 rgba(209,78,123,.25)}
.doorico::after{content:"";position:absolute;right:10px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--bell);border:2px solid var(--bell-d)}
.gate-rule{font-size:12px;color:var(--ink2);background:var(--surface);border:1.5px dashed var(--bell);border-radius:12px;padding:8px 14px;display:inline-block;margin-bottom:18px}
.streak{font-family:var(--mono);font-size:12px;color:var(--blue-d);background:var(--blue-soft);display:inline-block;padding:2px 12px;border-radius:99px;margin:0 0 18px 8px}
.gitem{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;transition:opacity .3s}
.gitem.done{opacity:.45}
.gitem.done .gt{text-decoration:line-through}
.gitem .src{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--blue);width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center}
.gitem .bd{flex:1}
.gitem .gt{font-weight:600}
.gitem .gm{font-size:12px;color:var(--ink2);margin-top:2px}
.gitem .acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.minibar{font-family:var(--mono);font-weight:700;color:var(--blue-d);background:var(--blue-soft);border-radius:99px;padding:5px 14px;font-size:13px}
.gitem .verdict{font-size:12px;margin-top:8px;font-weight:600}
.gitem .verdict.ok{color:var(--green)}
.gitem .verdict.skip{color:var(--red)}
.gate-foot{margin-top:26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.gate-hint{font-size:12px;color:var(--ink3)}
/* 铃铛印章 */
.stamp{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%) scale(2.2);opacity:0;pointer-events:none;z-index:120;text-align:center}
.stamp .ring{width:130px;height:130px;border-radius:50%;background:var(--bell);border:5px solid var(--bell-d);margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 0 rgba(0,0,0,.08);position:relative}
.stamp .ring::before{content:"";position:absolute;top:38%;left:10%;right:10%;height:4px;background:var(--bell-d);border-radius:4px}
.stamp .ring::after{content:"";position:absolute;bottom:16%;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--bell-d)}
.stamp .z{font-family:var(--serif);font-size:34px;font-weight:700;color:#6B4D00;margin-top:-22px}
.stamp .s{margin-top:14px;font-weight:700;color:var(--ink);background:var(--surface);border-radius:99px;padding:4px 16px;display:inline-block;border:1.5px solid var(--line)}
.stamp.show{animation:ding .6s cubic-bezier(.2,1.6,.4,1) forwards}
@keyframes ding{60%{transform:translate(-50%,-50%) scale(1) rotate(0)}75%{transform:translate(-50%,-50%) scale(1) rotate(-7deg)}90%{transform:translate(-50%,-50%) scale(1) rotate(5deg)}to{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
@media (prefers-reduced-motion:reduce){.stamp.show{animation:none;opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ---------- 0 督促台 ---------- */
/* P0 重点 · 置顶醒目卡 */
.focuscard{margin-top:16px;background:linear-gradient(180deg,var(--red-soft),var(--surface));border:2.5px solid var(--red);border-radius:var(--radius);padding:16px 18px;box-shadow:0 5px 0 rgba(224,49,47,.18)}
.focuscard>h3{color:var(--red);font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.focusitem{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(--red)}
.focusitem:last-of-type{border-bottom:none}
.focusitem.done{opacity:.45}
.focusitem.done .ft{text-decoration:line-through}
.focusitem .fchk{width:22px;height:22px;min-width:22px;border:2px solid var(--red);border-radius:50%;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;background:#fff}
.focusitem .fchk.on{background:var(--red)}
.focusitem .ft{font-weight:700;font-size:15px}
.focusitem .fn{font-size:11px;color:var(--red);font-weight:700;margin-top:2px;letter-spacing:.04em}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px}
.stat{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:16px}
.stat .k{font-size:12px;color:var(--ink2)}
.stat .v{font-family:var(--serif);font-size:30px;font-weight:700;margin-top:2px}
.stat .v small{font-size:13px;color:var(--ink3);font-family:var(--sans);font-weight:400}
.stat.bell{background:var(--bell-soft);border-color:var(--bell)}
.stat.bell .v{color:var(--bell-d)}
.loglist{list-style:none}
.loglist li{padding:9px 0;border-bottom:1px solid var(--line2);display:flex;gap:10px;font-size:13px}
.loglist li:last-child{border:none}
.loglist .d{font-family:var(--mono);color:var(--ink3);font-size:12px;white-space:nowrap;padding-top:1px}
.loglist .why{color:var(--red)}
.loglist .gain{color:var(--bell-d);font-weight:600}
/* 百宝袋 */
.pocket{margin-top:16px;background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);overflow:hidden}
.pocket .ph{background:var(--blue);color:#fff;padding:14px 18px 26px;position:relative}
.pocket .ph h3{color:#fff;margin:0;font-size:14px;letter-spacing:.06em}
.pocket .ph p{font-size:12px;opacity:.85;margin-top:2px}
.pocket .ph::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:170px;height:26px;background:var(--surface);border:2px solid var(--ink);border-bottom:none;border-radius:90px 90px 0 0}
.pocket .pb{padding:16px 18px}
.ritem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2)}
.ritem:last-child{border:none}
.ritem .rn{flex:1;font-weight:600}
.ritem .rc{font-family:var(--mono);color:var(--bell-d);font-weight:700;white-space:nowrap}
.raddrow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.raddrow input[type=text]{flex:1;min-width:140px;padding:8px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface2)}
.raddrow input[type=number]{width:90px;padding:8px 10px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface2)}

/* ---------- 1 任务 ---------- */
.tabs{display:flex;gap:6px;margin-top:18px;border-bottom:1.5px solid var(--line)}
.tab{padding:8px 14px;color:var(--ink2);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;font-weight:600}
.tab.on{color:var(--blue-d);border-color:var(--blue)}
.addrow{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.addrow input[type=text]{flex:1;min-width:180px;padding:9px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface)}
.addrow select,.addrow input[type=date]{padding:9px 10px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink2)}
.must{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink2);user-select:none}
.must.on{background:var(--red-soft);border-color:var(--red);color:var(--red);font-weight:700}
.tlist{list-style:none;margin-top:14px}
.titem{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.titem.donerow{opacity:.5}
.titem.donerow .tt{text-decoration:line-through}
.chk{width:22px;height:22px;min-width:22px;border:2px solid var(--ink3);border-radius:50%;margin-top:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.chk.on{background:var(--green);border-color:var(--green)}
.titem .bd{flex:1}
.titem .tt{font-weight:600}
.titem .meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.due{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.due.over{color:var(--red);font-weight:700}
.del{color:var(--ink3);font-size:16px;padding:2px 8px;border-radius:8px}
.del:hover{color:var(--red);background:var(--red-soft)}

/* ---------- 占位模块 ---------- */
.phase{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--blue-d);background:var(--blue-soft);padding:2px 10px;border-radius:99px;margin-top:10px}
.subchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.subchip{border:1.5px dashed var(--line);border-radius:12px;padding:8px 12px;color:var(--ink2);font-size:13px;background:var(--surface)}
.subchip b{font-family:var(--serif);color:var(--blue);margin-right:6px}

.edt{width:100%;min-height:200px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface2);padding:12px 14px;font-family:var(--sans);font-size:14px;line-height:1.7;resize:vertical}
.mrow{display:grid;grid-template-columns:1fr 92px 92px 92px;gap:6px;align-items:center;margin-bottom:6px}
.mrow .mtitle{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcell{border-radius:10px;padding:7px 4px;font-size:12px;font-weight:700;border:1.5px solid var(--line);background:var(--surface2);color:var(--ink3)}
.mcell.un{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.mcell.pub{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.mcell.na{background:var(--surface2);color:var(--ink3)}
.mcell.hd{background:none;border:none;color:var(--ink2);font-weight:700;cursor:default}
@media (max-width:760px){.mrow{grid-template-columns:1fr 72px 72px 72px}}

.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ns{border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;background:var(--surface2)}
.ns .k{font-size:11px;color:var(--ink2);font-weight:700}
.ns .v{font-family:var(--serif);font-size:20px;font-weight:700;margin-top:2px}
.ns .v small{font-size:11px;color:var(--ink3);font-family:var(--sans);font-weight:400}
.ns.ok{background:var(--green-soft);border-color:var(--green)}
.ns.ok .v{color:var(--green)}
.ns.bad{background:var(--red-soft);border-color:var(--red)}
.ns.bad .v{color:var(--red)}
.nsp{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.pp{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:var(--red-soft);color:var(--red);border:1px solid transparent}
.pp.on{background:var(--green-soft);color:var(--green)}
@media (max-width:760px){.grid4{grid-template-columns:1fr 1fr}}

.creed{margin-top:40px;padding-top:18px;border-top:1.5px dashed var(--line);font-family:var(--serif);font-size:15px;color:var(--ink2);line-height:2}
.creed em{font-style:normal;font-weight:700}
.creed div:nth-child(1) em{color:var(--blue-d)}
.creed div:nth-child(2) em{color:var(--bell-d)}
.creed div:nth-child(3) em{color:var(--red)}

.qmwrap{display:grid;grid-template-columns:22px 1fr 1fr;grid-template-rows:auto 1fr 1fr;gap:8px;margin-top:6px}
.qax{text-align:center;font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.25em}
.qay{writing-mode:vertical-rl;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.25em}
.qm{border-radius:14px;padding:12px 14px;min-height:110px;border:1.5px solid transparent}
.qm.q1{background:var(--red-soft);border-color:#F0C2BA}
.qm.q2{background:var(--green-soft);border-color:var(--green);box-shadow:0 2px 0 rgba(43,168,110,.25)}
.qm.q3{background:var(--bell-soft);border-color:#F0DCA0}
.qm.q4{background:var(--surface2);border-color:var(--line)}
.qmh{display:flex;justify-content:space-between;align-items:center}
.qmv{font-family:var(--serif);font-weight:700;font-size:15px}
.qm.q1 .qmv{color:var(--red)} .qm.q2 .qmv{color:var(--green)} .qm.q3 .qmv{color:var(--bell-d)} .qm.q4 .qmv{color:var(--ink3)}
.qmc{font-family:var(--mono);font-size:12px;font-weight:700;background:#fff;border-radius:99px;padding:0 9px;line-height:19px;color:var(--ink2);box-shadow:0 1px 0 rgba(0,0,0,.06)}
.qmd{font-size:11px;color:var(--ink2);margin:2px 0 8px}

/* ===================================================================
   我的工作台 · 蓝胖子督促版 —— 单文件应用 · 阅读指南
   ===================================================================

   〔架构〕无框架 / 无构建。每个模块的 rN() 是纯函数，返回 HTML 字符串；
   页面里的 onclick 调全局 handler，handler 改 Store.data 后调 refresh()。
   单一状态树 = Store.data（形状见 defaultData()），localStorage 自动存档。

   〔数据流〕
     用户操作 → 全局 handler → 改 Store.data → refresh()
     refresh() = renderNav() + renderPage() + Persist.save()
     renderPage() → REG 里当前模块的 render() → 返回 HTML 字符串塞进 #page

   〔路由〕location.hash = #/N → route() 设 UI.cur → refresh()。
           模块在 REG 数组登记（num / name / sec / badge / render）。

   〔任意门 Gate〕Gate.items() 跨模块汇总今天必须处理的事；
           renderGate() 弹拦截屏；Gate.verdict() 记结果、发/扣铃铛。

   〔AI〕ai(system,user,tools) → Anthropic API；aiParse() 解析 JSON。
           离线/沙箱不可用时各处都有降级兜底，不会崩。

   〔加一个新模块 N〕
     1. defaultData() 里加它的数据形状
     2. 写 rN()，用 head()/esc() 和现成 CSS class 拼 HTML 字符串返回
     3. 在 REG 注册（带 badge 函数）
     4. 加全局 handler：改 Store 后调 refresh()
     5.（可选）想进任意门就往 Gate.items() 加一条

   〔分区索引 · grep 横幅文字即可跳转〕
     基础设施：  数据层/工具 · 持久化 Persist · Store · 督促引擎 Gate ·
                 模块注册表 REG · UI / 路由 · 北极星 northStar ·
                 开门拦截屏 · 柯维四象限 · 占位渲染器 ph · 启动
     业务模块（render rN + handler，按文件先后排列）：
       [0]督促台  [1]任务计划  [4]副业账本  [5]与人连接  [9]收藏框
       [6]选题雷达  [8]写作室(含送审/解锁)  [2]Skills 管理  [3]品牌合作  [7]爆款Lab
     想改某模块：grep 它的中文名，或 "function r0".."function r9"。
   =================================================================== */

async function ai(system,user,tools){
  try{
    const body={model:'claude-sonnet-4-20250514',max_tokens:1500,system,messages:[{role:'user',content:user}]};
    if(tools) body.tools=tools;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    const t=(d.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n').trim();
    return t||null;
  }catch(e){ return null; }
}
/* 60分可发标准 · 提炼自意疏 wechat-coauthor 的 AI 味红线 */
const REVIEW_RULES=`可发标准（60分制）：
1) 开头10字内有钩子，禁止"在当今时代/随着…的发展/在…背景下"式开场
2) 至少有一个具体例子、场景或数字，不全是抽象论述

5) 结尾有行动号召或互动钩子，不空泛升华
达到4条即为通过（≥60分）。`;
/* ============ 意疏写作法（内置自 wechat-coauthor skill）============

const YISHU_VOICE=`意疏写作法（公众号「意疏的AI口袋」）：
· 风格：专业但小白能懂，真诚利他，口语化，像和朋友聊，不端着。
· voice 从作者本人嘴里出来；不编造没给过的观点 / 金句 / 例子 / 数据。
· 排版：每段 3-4 行内；小标题用问题式；**加粗**重点；适度 emoji；短段是情绪、长段是论证，别连续 3 段单句。
· AI 味禁用：开头别用"在当今时代 / 随着…的发展 / 想象一下"；别用"第一反应… / 随后意识到… / 它改变的是你…的姿势 / 这就够了 / 总觉得还差一口气 / 最戳我的点 / 愣了一下"；结尾别用"让我们一起… / 相信未来"。

const YISHU_PROMPT=`你是我的写作协作者，帮我把口述/想法变成公众号文章。文章 voice 必须从我嘴里出来，你负责结构化、扩写、降 AI 味，不替我造观点/金句/例子/数据。
我的公众号叫「意疏的AI口袋」。风格：专业但小白能懂，真诚利他，口语化，不端着，像和朋友聊。

按 4 步走，不跳步：

【第1步·采访补素材】先别写。必问两个：
1) 你用这东西时，哪个瞬间让你停了一下？
2) 你最想说的核心是哪一句话？
教程类再追问：完整操作每步（问截图）、第一次用的场景与结果、踩了什么坑。我没素材就让你写时，温和拒绝，先把这两问逼出来。

【第2步·结构化（只搭骨架，严禁扩写）】
清理转写噪声（错别字/口头禅/断句）→ 原封不动提取我的金句 → 搭骨架：3 个标题候选 + 中段结构（每块标我的原话）+ 结尾方向；教程类每步标 📸。严禁加我没说过的观点/金句/例子。等我确认骨架。

【第3步·扩写（填血肉，标记 [AI补]）】
AI 加的每句标 [AI补]/[AI过渡]/[AI展开]，我的原话不标、原封不动。
可以加：过渡句、把场景说清楚的细节、整理步骤、适度 emoji。
不能加：新观点、新金句/升华、新例子、新数据。
量度：观点类→1200-1500字，教程类→2000-3000字，我的原话占比≥40%。
排版：每段 3-4 行内；小标题用问题式；**加粗**重点；短段是情绪、长段是论证，别连续 3 段单句。

AI 味禁用（出现即删改）：
· 开头："在当今时代/随着…的发展/X这词被讲烂了/想象一下"
· 句式："第一反应…/随后意识到…（假反应）"、"它改变的是你…的姿势（伪深刻）"、"这就够了/总觉得还差一口气（廉价升华）"、先否后扬的反转、"最戳我的点"、"愣了一下"
· 结尾："让我们一起…/相信未来/关注XX我们一起把YY变成ZZ"
· 词语：显著提升→涨了X倍、充分利用→用好、深入了解→搞清楚、进行/实施/开展→做/用/开始
更有人味：我草。/ 有点麻。/ 这就很离谱。/ 我停了几秒。/ 我盯着屏幕看了几秒。/ 我去干别的了，回来它已经跑完了。
扩写完列清单：AI 加了哪些、我的原话占比，等我说 OK。

【第4步·人味注入（自检）】我改完后做 4 检查：
1) 删签名测试：删掉签名放到陌生号，读者还认得出是「意疏的AI口袋」吗？
2) 态度密度：每 200 字至少 1 处态度词（我草/我寻思/有点麻），不够指出在哪补；
3) AI 味扫描：标出仍像 AI 的句子给方向（不替我改）；
4) 朗读测试：提醒我读一遍，卡壳处就是要改的。
金句：只标我真说过、"只有我能说出来"的句子，不现编，宁漏不错。

风格参照（我欣赏的）：时间锚定（"震惊了5秒，然后开始思考"）；成功了还在怀疑；大事+小事反差（"然后我去刷红果短剧了。修仙类的。"）；技术拟人化；先说疑虑再打脸；爽但未完成。
三层调味（交替用，且都来自我的口述、AI 不主动塞）：梗（活人感）+ 典故（B格背书）+ 结构对应。
我讨厌：AI 公众号套路（吐槽行业→救世主→步骤→升华）、假谦虚、堆排比、口号式结尾、每段单句像 PPT。

下面是我的素材，从第 1 步开始（素材够就跳到第 2 步，但别跳过第 1 步直接写）：
{{素材}}`;

/* ============ 持久化层 ============
   部署/本地打开时：localStorage 自动存档
   聊天预览环境：沙箱禁用存储 → 自动降级为预览模式 */
const SAVE_KEY='lanpangzi-workbench-v1';
const Persist={
  ok:(function(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; } })(),
  load(){ if(!this.ok) return null; try{ const s=localStorage.getItem(SAVE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } },
  save(){ if(!this.ok) return; try{
      localStorage.setItem(SAVE_KEY, JSON.stringify(Store.data));
      const el=document.getElementById('saveState');
      if(el) el.textContent='已保存 '+new Date().toTimeString().slice(0,5);
    }catch(e){} },
  exportJSON(){
    const blob=new Blob([JSON.stringify(Store.data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='workbench-backup-'+T+'.json'; a.click();
  },
  importJSON(file){
    const r=new FileReader();
    r.onload=()=>{ try{
        const d=JSON.parse(r.result);
        if(!d.tasks||!d.gate) throw 0;
        Store.data=d; this.save(); refresh(); alert('导入成功');
      }catch(e){ alert('文件格式不对，导入失败'); } };
    r.readAsText(file);
  },
  reset(){
    if(!confirm('清空所有数据、恢复初始空白状态？建议先导出备份。')) return;
    Store.data=defaultData(); this.save(); refresh();
  },
};

function migrate(d){
  if(!d) return null;
  d.gate.openDays=d.gate.openDays||[];
  d.gate.focus=d.gate.focus||[];
  ((d.studio||{}).drafts||[]).forEach(dr=>{ dr.review=dr.review||{status:'none',issues:[]}; if(dr.locked===undefined) dr.locked=false; });
  return d;
}
const Store = {
  data: migrate(Persist.load()) || defaultData(),
  tasks(){ return this.data.tasks },
  addTask(t){ this.data.tasks.unshift(t) },
  delTask(id){ this.data.tasks = this.data.tasks.filter(x=>x.id!==id) },
  toggleTask(id){ const t=this.data.tasks.find(x=>x.id===id); if(t){ t.done=!t.done; t.doneAt=t.done?T:''; } },
};

function lastTouch(pid){
  const ds=Store.data.side.ledger.filter(x=>x.pid===pid).map(x=>x.d).sort();
  return ds.length?ds[ds.length-1]:'';
}
function dueC(c){ return !c.last || daysSince(c.last)>=c.every; }

/* ============ 督促引擎 + 铃铛规则 ============
   规则：全部「已做完」零放弃 → 铃铛+1；连开每满7天 → 额外+3
        有放弃 → 过关但当天没有铃铛                     */
const Gate = {
  items(){
    const out=[];
    Store.tasks().forEach(t=>{
      if(t.done) return;
      if(t.must && (!t.due || t.due<=T)) out.push({id:'task-'+t.id, kind:'task', num:'1', title:t.title, meta:'今日必做 · '+t.cat, ref:t.id, must:true});
      else if(t.due && t.due<T)          out.push({id:'task-'+t.id, kind:'task', num:'1', title:t.title, meta:'已逾期 '+fmtDate(t.due)+' · '+t.cat, ref:t.id});
    });
    Store.data.side.projects.forEach(p=>{
      if(p.status!=='活跃') return;
      const last=lastTouch(p.id), sil=last?daysSince(last):null;
      if(sil===null || sil>=p.silence)
        out.push({id:'side-'+p.id, kind:'side', num:'4', title:'给「'+p.name+'」记一条动作', meta:sil===null?'还从没动过它':'已静默 '+sil+' 天（阈值 '+p.silence+' 天）', ref:p.id, must:true});
    });
    Store.data.people.contacts.forEach(c=>{
      if(!dueC(c)) return;
      out.push({id:'ppl-'+c.id, kind:'person', num:'5', title:'给 '+c.name+' 发至少 '+(c.min||2)+' 条消息', meta:'话题线索：'+(c.topic||'随便聊聊近况'), ref:c.id, must:true});
    });
    Store.data.studio.drafts.forEach(dr=>{
      if(dr.stage!=='成稿'||!dr.doneD) return;
      const un=PLAT.filter(p=>dr.pub[p.k]==='');
      if(un.length && daysSince(dr.doneD)>=3)
        out.push({id:'pub-'+dr.id, kind:'pub', num:'8', title:'把「'+dr.title+'」发出去', meta:'成稿已 '+daysSince(dr.doneD)+' 天 · 还差：'+un.map(p=>p.n).join(' / '), ref:dr.id, must:true});
    });
    return out;
  },
  pending(){ return this.items().filter(i=>!Store.data.gate.verdicts[i.id]) },
  needGate(){ return Store.data.gate.date!==T && this.items().length>0 },
  verdict(id, type, reason){
    Store.data.gate.verdicts[id]=type;
    const it=this.items().find(i=>i.id===id);
    if(type==='ok' && it){
      if(it.kind==='task') Store.toggleTask(it.ref);
      if(it.kind==='side') Store.data.side.ledger.unshift({id:uid(), d:T, pid:it.ref, type:'动作', amt:0, note:'任意门补记：今天动过了'});
      if(it.kind==='person') markContacted(it.ref, '任意门打卡：消息已发');
      if(it.kind==='pub'){
        const dr=Store.data.studio.drafts.find(x=>x.id===it.ref);
        const p=dr&&PLAT.find(p=>dr.pub[p.k]==='');
        if(p){ dr.pub[p.k]=T; Store.data.gate.history.unshift({d:T,type:'ok',text:'「'+dr.title+'」已发 '+p.n}); }
      }
    }
    if(type==='mini' && it){
      if(it.kind==='side') Store.data.side.ledger.unshift({id:uid(), d:T, pid:it.ref, type:'动作', amt:0, note:'缩小术：动了 5 分钟'});
      if(it.kind==='person') markContacted(it.ref, '缩小术打卡：发了消息');
      /* 任务类不标完成，明天接着来，但今天不算放弃 */
      Store.data.gate.history.unshift({d:T, type:'ok', text:'缩小完成「'+it.title+'」· 先动了 5 分钟'});
    }
    if(type==='skip'){
      const cat=excuseCat(reason||'');
      Store.data.gate.history.unshift({d:T, type:'skip', cat, text:'放弃「'+(it?it.title:'')+'」：'+(reason||'未写理由')});
      const M=T.slice(0,7);
      const n=Store.data.gate.history.filter(h=>h.type==='skip'&&h.cat===cat&&h.d.slice(0,7)===M).length;
      if(n>=2 && Store.data.gate.bells>0){
        Store.data.gate.bells--;
        Store.data.gate.history.unshift({d:T, type:'skip', text:'拖延税：本月第 '+n+' 次用「'+cat+'」当理由 · 铃铛 −1'});
      }
    }
    renderGate();
    Persist.save();
    if(this.pending().length===0) this.pass();
  },
  pass(){
    const g=Store.data.gate;
    g.date=T; g.streak++; if(!g.openDays.includes(T)) g.openDays.push(T);
    const allClean = !Object.values(g.verdicts).includes('skip');
    let gained=0, msg='';
    if(allClean){
      gained=1;
      if(g.streak%7===0){ gained+=3; msg='全勤+连开'+g.streak+'天！🔔 +'+gained; }
      else msg='门开了！全勤 🔔 +1';
      g.history.unshift({d:T,type:'gain',text:(g.streak%7===0?'全勤 + 连开满'+g.streak+'天 · 铃铛 +'+gained:'全勤开门 · 铃铛 +1')});
    }else{
      msg='门开了 · 有放弃，今天没有铃铛';
      g.history.unshift({d:T,type:'ok',text:'门开了（有放弃项，无铃铛）'});
    }
    g.bells+=gained;
    document.getElementById('stampMsg').textContent=msg;
    const s=document.getElementById('stamp');
    s.classList.add('show');
    setTimeout(()=>{ s.classList.remove('show'); document.getElementById('gate').classList.remove('open'); UI.go('0'); refresh(); },1500);
  },
};

function esc(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) }

function northStar(){
  const g=Store.data.gate;
  const open30=(g.openDays||[]).filter(d=>daysSince(d)<30).length;
  const pubs=Store.data.studio.drafts.filter(d=>d.doneD&&PLAT.some(p=>/^\d{4}/.test(d.pub[p.k])));
  let lag='—', lagOk=null;
  if(pubs.length){
    const avg=pubs.reduce((a,d)=>{
      const first=PLAT.map(p=>d.pub[p.k]).filter(v=>/^\d{4}/.test(v)).sort()[0];
      return a+Math.max(0,(new Date(first)-new Date(d.doneD))/36e5);
    },0)/pubs.length;
    lag=Math.round(avg)+'h'; lagOk=avg<=48;
  }
  const wk=PLAT.map(p=>Store.data.studio.drafts.filter(d=>/^\d{4}/.test(d.pub[p.k])&&daysSince(d.pub[p.k])<7).length);
  const wkHit=wk.filter(n=>n>=1).length;
  const wkOk=wkHit===PLAT.length;
  const act=Store.data.side.projects.filter(p=>p.status==='活跃');
  const hit=act.filter(p=>Store.data.side.ledger.filter(e=>e.pid===p.id&&daysSince(e.d)<7).length>=2).length;
  return {open30, lag, lagOk, wk, wkHit, wkOk, hit, actN:act.length, actOk:act.length>0&&hit===act.length};
}

function addFocus(){
  const i=document.getElementById('fcx');
  if(!i.value.trim()){ i.focus(); return; }
  Store.data.gate.focus=Store.data.gate.focus||[];
  Store.data.gate.focus.push({id:uid(), text:i.value.trim(), note:'P0', done:false});
  refresh();
}
function toggleFocus(id){
  const f=(Store.data.gate.focus||[]).find(x=>x.id===id);
  if(f){ f.done=!f.done; refresh(); }
}
function delFocus(id){
  if(!confirm('从本月重点里移除这条？')) return;
  Store.data.gate.focus=(Store.data.gate.focus||[]).filter(x=>x.id!==id);
  refresh();
}
function redeem(id){
  const g=Store.data.gate, r=g.rewards.find(x=>x.id===id);
  if(!r||g.bells<r.cost) return;
  if(!confirm('用 '+r.cost+' 个铃铛兑换「'+r.name+'」？')) return;
  g.bells-=r.cost;
  g.history.unshift({d:T,type:'gain',text:'兑换「'+r.name+'」 · 铃铛 −'+r.cost+'，好好享受'});
  refresh();
}
function addReward(){
  const n=document.getElementById('rn'), c=document.getElementById('rc');
  if(!n.value.trim()||!(+c.value>0)){ n.focus(); return; }
  Store.data.gate.rewards.push({id:uid(), name:n.value.trim(), cost:Math.round(+c.value)});
  refresh();
}
function delReward(id){
  Store.data.gate.rewards=Store.data.gate.rewards.filter(r=>r.id!==id);
  refresh();
}

    <div class="gate-foot">

      <button class="btn ghost sm" onclick="document.getElementById('gate').classList.remove('open')">先看一眼工作台（不算开门）</button>

    <div class="creed">

      <div>用 <em>行动</em> 把人生带到更高的位置。</div>
    </div>
  </div>`;
  g.classList.add('open');
}
const MiniT={};
function startMini(id){
  if(MiniT[id]) return;
  let remain=5*60;
  const draw=()=>{
    const box=document.getElementById('acts-'+id); if(!box) return;
    box.innerHTML=`<span class="minibar">⏱ ${Math.floor(remain/60)}:${String(remain%60).padStart(2,'0')} 缩小中 · 就动 5 分钟</span>
      <button class="btn sm pri" onclick="finishMini('${id}')">动完了</button>`;
  };
  draw();
  MiniT[id]=setInterval(()=>{ remain--; if(remain<=0) finishMini(id); else draw(); },1000);
}
function finishMini(id){

/* ============ 柯维四象限 ============ */
const QMETA={
  1:{n:'Q1 立即做', c:'red',   d:'重要 × 紧急 · 危机区'},
  2:{n:'Q2 安排做', c:'green', d:'重要 × 不紧急 · 高效能区'},
  3:{n:'Q3 少掺和', c:'bell',  d:'紧急 × 不重要 · 别人的要事'},
  4:{n:'Q4 别做了', c:'',      d:'不重要 × 不紧急 · 逃避区'},
};
function quad(t){ if(t.imp==null||t.urg==null) return 0; return t.imp?(t.urg?1:2):(t.urg?3:4); }
function setQuad(id,q){
  const t=Store.tasks().find(x=>x.id===id); if(!t) return;
  t.imp=q<=2; t.urg=(q===1||q===3);
  if(q===1) t.must=true;
  refresh();
}
function qMatrix(){
  const open=Store.tasks().filter(t=>!t.done);
  const q2w=Store.tasks().filter(t=>t.done&&t.doneAt&&daysSince(t.doneAt)<7&&quad(t)===2).length;
  const V={1:'立即去做',2:'计划去做',3:'授权去做',4:'尽量不做'};
  const box=q=>{
    const ts=open.filter(t=>quad(t)===q);
    return `<div class="qm q${q}">
      <div class="qmh"><span class="qmv">${V[q]}</span><span class="qmc">${ts.length}</span></div>
      <div class="qmd">${QMETA[q].d.split(' · ')[1]||''}${q===2?` · 本周完成 ${q2w} 件`:''}</div>
      ${ts.slice(0,5).map(t=>`<div class="qmi">
        <button class="qmchk" onclick="Store.toggleTask('${t.id}');refresh()" aria-label="完成"></button>
        <span>${esc(t.title)}</span>
      </div>`).join('')||'<div class="qme">— 空 —</div>'}
      ${ts.length>5?`<div class="qme">还有 ${ts.length-5} 条，去 1 号看全部</div>`:''}
    </div>`;
  };
  const un=open.filter(t=>quad(t)===0);
  return `<div class="card"><h3>柯维四象限 · 要事第一 <span style="font-weight:400;color:var(--ink3)">— Q2 决定你三个月后的样子</span></h3>
    <div class="qmwrap">
      <i></i><div class="qax">紧 急</div><div class="qax">不 紧 急</div>
      <div class="qay">重 要</div>${box(1)}${box(2)}
      <div class="qay">不 重 要</div>${box(3)}${box(4)}
    </div>
    ${un.length?`<div class="qmun">${un.map(t=>`<div class="qt"><span style="flex:1;font-size:13px">${esc(t.title)}</span>
      ${[1,2,3,4].map(q=>`<button class="btn sm ${q===2?'pri':''}" style="padding:1px 9px;font-size:12px" onclick="setQuad('${t.id}',${q})">Q${q}</button>`).join('')}
    </div>`).join('')}</div>`:''}
  </div>`;
}

async function reviewAI(id){
  const d=Store.data.studio.drafts.find(x=>x.id===id); if(!d) return;
  saveDraft();
  if(!d.content||d.content.length<50){ alert('稿子太短，先写够再送审。'); return; }
  Busy['rv'+id]=1; refresh();
  const res=await ai('你是严格但建设性的发稿审核员。只返回 JSON，不要任何其他文字或代码块标记。',
    `按以下标准审核稿件，返回 JSON：{"pass":true/false,"score":0-100,"issues":["未通过时给最多3条最小修改建议，每条20字内；通过则为空数组"]}\n\n${REVIEW_RULES}\n\n稿件标题：${d.title}\n稿件正文：\n${d.content.slice(0,4000)}`);
  const j=aiParse(res);
  delete Busy['rv'+id];
  if(!j){ alert('AI 暂不可用，无法送审（本地打开需配置代理）。'); refresh(); return; }
  if(j.pass){
    d.review={status:'pass',issues:[]}; d.locked=true;
    d.stage='成稿'; if(!d.doneD) d.doneD=T;
    Store.data.gate.history.unshift({d:T,type:'gain',text:'「'+d.title+'」过审亮绿灯（'+(j.score||60)+'分）· 编辑已锁定'});
  }else{
    d.review={status:'fail',issues:(j.issues||[]).slice(0,3)};
  }
  refresh();
}
function unlockEdit(id){
  const d=Store.data.studio.drafts.find(x=>x.id===id); if(!d) return;
  const g=Store.data.gate;
  if(g.bells<2){ alert('铃铛不够（需要 2 个）。要么发出去，要么去任意门挣铃铛。'); return; }
  if(!confirm('花 2 🔔 解锁修改？改完需要重新送审才能恢复绿灯。')) return;
  g.bells-=2; d.locked=false; d.review={status:'none',issues:[]};
  g.history.unshift({d:T,type:'skip',text:'付费改稿「'+d.title+'」 · 铃铛 −2（完美主义税）'});
  refresh();
}

function advanceDeal(id){
  const d=Store.data.brand.deals.find(x=>x.id===id); if(!d) return;

    if(amt===null) return;
    const v=Math.round(+amt)||0;

  }
  d.stage=next; refresh();

    ${['全部','小红书','抖音','公众号'].map(p=>`<button class="tab ${labP===p?'on':''}" onclick="labP='${p}';refresh()">${p}</button>`).join('')}
    <span style="border-left:1.5px solid var(--line);margin:6px 4px"></span>
    ${['全部',...TRICKS].map(t=>`<button class="tab ${labT===t?'on':''}" onclick="labT='${t}';refresh()">${t}</button>`).join('')}
  </div>
  <div style="margin-top:14px">${rows||'<div class="empty"><div class="big">这个分类还没收录</div>刷到好的就丢进来。</div>'}</div>`;
}
function addLab(){
  const i=document.getElementById('lbd');
  if(!i.value.trim()){ i.focus(); return; }
  Store.data.lab.entries.unshift({id:uid(), d:T, platform:document.getElementById('lbp').value, trick:document.getElementById('lbt').value, desc:i.value.trim(), note:''});
  refresh();
}
async function labAI(id){
  const e=Store.data.lab.entries.find(x=>x.id===id); if(!e) return;
  Busy['lb'+id]=1; refresh();
  const res=await ai('你是爆款内容分析师，结论必须可复用、可执行。直接输出拆解，不要解释。',
    `分析这条${e.platform}爆款（类型：${e.trick}）为什么火，输出 80 字内的拆解笔记，包含一个可复用句式或动作：${e.desc}`);
  e.note=res||'（离线）手动拆：钩子是什么 / 结构怎么走 / 戳了什么情绪，各写一句';
  delete Busy['lb'+id]; refresh();
}
function labToSkill(id){
  const e=Store.data.lab.entries.find(x=>x.id===id); if(!e) return;
  Store.data.skills.list.unshift({id:uid(), name:e.trick+'套路 · '+e.platform, cat:'平台改写类', body:e.note+'\n\n来源案例：'+e.desc});
  UI.go('2');
}
function delLab(id){ Store.data.lab.entries=Store.data.lab.entries.filter(e=>e.id!==id); refresh(); }

/* ============ 占位渲染器（已无模块使用，保留备用） ============ */
function ph(num,name,desc,subs,phase){
  return ()=> head(num,name,desc)+`
    <span class="phase">${phase}上线 · 插槽已就位</span>
    <div class="card"><h3>规划中的子页</h3>
      <div class="subchips">${subs.map(s=>{const[a,...b]=s.split(' ');return `<div class="subchip"><b>${a}</b>${b.join(' ')}</div>`}).join('')}</div>
    </div>`;
}

/* ============ 启动 ============ */
function refresh(){ renderNav(); renderPage(); Persist.save(); }
window.addEventListener('hashchange',route);
window.addEventListener('keydown',e=>{
  if(/^[0-9]$/.test(e.key) && !/INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)
     && !document.getElementById('gate').classList.contains('open')) UI.go(e.key);
});
(function(){
  const st=document.getElementById('saveState'), dot=document.getElementById('saveDot');
  if(Persist.ok){ st.textContent='持久化已开启'; dot.style.background='var(--green)'; }
  else { st.textContent='预览模式 · 刷新不保存（部署后自动持久化）'; }
})();
route();
renderGate(); // 每日首开拦截
</script>
</body>
