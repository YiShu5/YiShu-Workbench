<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的工作台 · 蓝胖子督促版</title>
<link rel="stylesheet" href="/src/styles/workbench.css">
</head>
<body>

<div id="gate" role="dialog" aria-label="今日任意门"></div>
<div class="stamp" id="stamp" aria-hidden="true"><div class="ring"><div class="z">叮</div></div><div class="s" id="stampMsg">门开了</div></div>

<div id="app">
  <div class="scrim" id="scrim" onclick="UI.closeNav()"></div>
  <aside id="side">
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div><h1>我的工作台</h1><div class="sub">用 AI 让普通人变强</div></div>
    </div>
    <div class="bellbar"><small>我的铃铛</small><span class="n" id="bellN">🔔 0</span></div>
    <nav id="nav"></nav>
    <div class="foot">
      <div class="row"><span><span class="dot" id="saveDot"></span><span id="saveState">…</span></span></div>
      <div class="row" style="gap:6px;justify-content:flex-start">
        <button class="btn sm ghost" onclick="Persist.exportJSON()">导出</button>
        <button class="btn sm ghost" onclick="document.getElementById('impf').click()">导入</button>
        <button class="btn sm ghost" onclick="Persist.reset()">重置</button>
      </div>
      <input type="file" id="impf" accept=".json" style="display:none" onchange="if(this.files[0])Persist.importJSON(this.files[0]);this.value=''">
    </div>
  </aside>
  <main id="main">
    <div class="topbar">
      <button class="hamb" onclick="UI.openNav()" aria-label="打开导航">☰</button>
      <div class="where" id="where"></div>
      <span class="tb-bell" id="bellTop">🔔 0</span>
    </div>
    <div class="page" id="page"></div>
  </main>
</div>

<script src="/workbench.js"></script>
</body>
</html>
